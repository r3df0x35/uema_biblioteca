name: Pipeline de Qualidade

on:
  push:
    branches: [ main ]

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: flake8 biblioteca/
      - run: pytest --cov=biblioteca --cov-fail-under=60
